name: CI Pipeline

on:
  push:
    branches: [ "main", "dev" ]
    
permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
  
    env:                             
      FUNCTION_NAME: ""
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
         fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Run tests
      run: |
        python -m pytest
        
    - name: Install Bandit
      run: |
        pip install bandit

    - name: Run security scan (Bandit)
      run: |
        bandit -r services -ll
        bandit -r tests -s B101
        
    - name: Run Gitleaks (secret scanning)
      uses: gitleaks/gitleaks-action@v2

    - name: Set environment
      run: |
        if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
          echo "FUNCTION_NAME=poc-users-service" >> $GITHUB_ENV
        else
          echo "FUNCTION_NAME=poc-users-service-dev" >> $GITHUB_ENV
        fi
     
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        aws-region: us-east-1

    - name: Zip Lambda function
      run: |
        cd services/users
        zip -r function.zip .

    - name: Deploy new Lambda
      run: |
        aws lambda update-function-code \
          --function-name  $FUNCTION_NAME \
          --zip-file fileb://services/users/function.zip

        echo "Waiting for Lambda update to finish..."

        aws lambda wait function-updated \
         --function-name $FUNCTION_NAME
      
        VERSION=$(aws lambda publish-version \
         --function-name $FUNCTION_NAME \
         --query 'Version' \
         --output text)

        echo "NEW_VERSION=$VERSION" >> $GITHUB_ENV

    - name: Install jq
      run: sudo apt-get install -y jq
      
    - name: Test Lambda
      id: test_lambda
      run: |
       if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
         ALIAS="prod"
       else
         ALIAS="dev"
       fi
       
       aws lambda invoke \
       --function-name $FUNCTION_NAME:dev \
       --cli-binary-format raw-in-base64-out \
       --payload '{"fail": true}' \
       response.json

       cat response.json

       STATUS_CODE=$(cat response.json | jq -r '.statusCode')

       if [ "$STATUS_CODE" != "200" ]; then
        echo "Lambda test failed"
        exit 1
       fi
  
    - name: Promote version to alias
      if: success()
      run: |
       aws lambda update-alias \
       --function-name $FUNCTION_NAME \
       --name dev \
       --function-version $NEW_VERSION  
    
    - name: Configure AWS credentials
      if: failure()
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        aws-region: us-east-1

    - name: Rollback alias
      if: failure()
      run: |
         echo "Rollback alias to previous version"

         if [[ "$GITHUB_REF" == "refs/heads/main" ]]; then
          ALIAS="prod"
         else
          ALIAS="dev"
         fi

         echo "Using alias: $ALIAS"

         PREVIOUS_VERSION=$(aws lambda get-alias \
         --function-name $FUNCTION_NAME \
         --name $ALIAS \
         --query 'FunctionVersion' \
         --output text)

          echo "Previous version: $PREVIOUS_VERSION"

         aws lambda update-function-code \
         --function-name $FUNCTION_NAME \
          --name "$ALIAS" \
          --function-version $PREVIOUS_VERSION
         --region us-east-1 \
                
